        <text x="0" y="20" font-family="monospace" font-size="12" fill="#64748b" font-weight="bold">&gt; ALL_SYSTEMS_GO.</text>
        <text x="0" y="40" font-family="monospace" font-size="12" fill="#0033a0" font-weight="bold">&gt; STANDING_BY_
