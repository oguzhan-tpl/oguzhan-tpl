        <text x="15" y="28" font-family="monospace" font-size="12" fill="#64748b" font-weight="bold">WEAPONIZED SCRIPTING:</text>
        <text x="15" y="52" font-family="monospace" font-size="20" fill="#0033a0" font-weight="bold">PYTHON CORE ENG.</text>

