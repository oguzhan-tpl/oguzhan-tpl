        <rect width="360" height="70" fill="none" stroke="#fca5a5" stroke-width="1" rx="6"/>
        <text x="15" y="28" font-family="monospace" font-size="12" fill="#ef4444" font-weight="bold">GLOBAL COMM LINK:</text>
        <text x="15" y="52" font-family="monospace" font-size="20" fill="#b91c1c" font-weight="bold">wp_oguz.46</text>
        
        <path d="M 210,35 Q 220,10 230,35 T 250,35 T 270,35 T 290,35 T 310,35 T 330,35 T 350,35" fill="none" stroke="#dc2626" stroke-width="2">
