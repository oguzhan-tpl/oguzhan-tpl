    <text x="425" y="265" font-family="monospace" font-size="14" fill="#00aa00" text-anchor="middle" font-weight="bold" letter-spacing="2" opacity="0">
      &gt; ACCESS GRANTED: MR. OGUZ &lt;
      <animate attributeName="opacity" values="0;1" begin="1.2s" dur="0.1s" fill="freeze" />
    </text>
  </g>

  <g mask="url(#wipeMaskLight)">
    
