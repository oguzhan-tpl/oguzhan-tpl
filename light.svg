        <path d="M66,68 C60,95 62,125 66,135 C72,185 110,215 140,215 C170,215 202,185 208,135 C212,125 214,95 208,68" fill="none" stroke="#0033a0" stroke-width="2.5"/>
        <path d="M58,88 L132,96 L208,88 L202,112 C196,130 175,135 164,135 C148,135 138,122 132,110 L132,110 C126,122 116,135 100,135 C89,135 65,130 60,112 Z" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
        <path d="M66,96 L124,102 L122,120 C117,128 106,130 98,128 C84,124 72,112 66,96 Z" fill="#0ea5e9" opacity="0.3"/>
        <path d="M196,96 L138,102 L140,120 C145,128 156,130 164,128 C178,124 190,112 196,96 Z" fill="#0ea5e9" opacity="0.3"/>
