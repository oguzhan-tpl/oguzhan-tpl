<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 460" width="850" height="460">
  <defs>
    <filter id="glowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <mask id="wipeMaskLight">
      <rect x="0" y="0" width="0" height="460" fill="white">
        <animate attributeName="width" values="0;850" begin="2s" dur="1s" fill="freeze" />
      </rect>
    </mask>
  </defs>

  <rect width="850" height="460" fill="#f4f7f9" />

  <g>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.9;1" dur="2.2s" fill="freeze" />
    
    <text x="425" y="210" font-family="monospace" font-size="28" fill="#0033a0" text-anchor="middle" font-weight="bold" letter-spacing="6">
      STARK SECURE PROTOCOL
      <animate attributeName="opacity" values="0;1;0;1;0;1" dur="1.5s" fill="freeze" />
    </text>
    <text x="425" y="245" font-family="monospace" font-size="14" fill="#333333" text-anchor="middle" letter-spacing="2" opacity="0">
      AUTHENTICATING USER...
