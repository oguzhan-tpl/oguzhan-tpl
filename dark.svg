<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%" font-family="'Courier New', monospace" style="background-color: #03060c;">
  
  <style>
    /* 1. GİRİŞ YAZILARI ANİMASYONLARI (Tam Merkezde, Çakışmayan Akış) */
    .seq-1 { animation: hideIntro 0.1s 2.8s forwards; }
    .seq-2 { opacity: 0; animation: showHideIntro 2.8s 2.8s forwards; }
    
    @keyframes hideIntro {
      to { opacity: 0; visibility: hidden; }
    }
    
    @keyframes showHideIntro {
      0%, 95% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; }
    }

    /* Daktilo Maskesi Kaydırma Efekti */
    .slide-1 { animation: slideMask 1.5s 0.5s steps(20) forwards; }
    .slide-2 { animation: slideMask 1.5s 3.3s steps(20) forwards; }
    
    @keyframes slideMask {
      to { transform: translateX(750px); }
    }

    /* 2. ANA SİSTEMİN AÇILMASI (5.6 saniyeden sonra) */
    .main-system { opacity: 0; animation: systemOn 1s 5.6s forwards; }
    @keyframes systemOn { 100% { opacity: 1; } }

    /* Çekirdek Pop-up Animasyonu */
    .core-pop { transform: scale(0); transform-origin: 640px 360px; animation: popUp 1s 5.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes popUp { 100% { transform: scale(1); } }

    /* Lazer Veri Yollarının Çizilmesi */
    .draw-line { stroke-dasharray: 500; stroke-dashoffset: 500; animation: draw 1s 6.2s forwards; }
    @keyframes draw { 100% { stroke-dashoffset: 0; } }

    /* Yan Panellerin Belirmesi */
    .panel { opacity: 0; animation: fadeIn 1s 6.8s forwards; }
    @keyframes fadeIn { 100% { opacity: 1; } }

    /* 3. DÖNGÜSEL (SÜREKLİ) ANİMASYONLAR */
    .spin-cw { animation: spin 20s linear infinite; transform-origin: 640px 360px; }
    .spin-ccw { animation: spinRev 15s linear infinite; transform-origin: 640px 360px; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes spinRev { 100% { transform: rotate(-360deg); } }

    .pulse { animation: beat 2s infinite alternate; transform-origin: 640px 360px; }
    @keyframes beat { 0% { transform: scale(0.95); opacity: 0.8; } 100% { transform: scale(1.05); opacity: 0.3; } }

    .blink { animation: flash 1s infinite; }
    @keyframes flash { 50% { opacity: 0; } }

    .bar-move { animation: loadBar 3s infinite alternate; }
    @keyframes loadBar { 0% { width: 40px; } 100% { width: 220px; } }
  </style>

  <defs>
    <!-- Ferah ve temiz nokta ızgarası -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.05" />
    </pattern>
  </defs>

  <!-- ARKA PLAN -->
  <rect width="100%" height="100%" fill="#03060c" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- =====================================================================
       AŞAMA 1: GİRİŞ SEKANSI (YAZILAR) 
       Milimetrik olarak merkeze sabitlendi, CSS transform çakışması giderildi.
       ===================================================================== -->
  
  <g class="seq-1" transform="translate(640, 360)">
    <text x="0" y="15" font-size="45" font-weight="bold" fill="#00e5ff" text-anchor="middle" letter-spacing="8">OĞUZHAN TOPAL</text>
    <!-- Yazıyı örten ve sağa çekilen maske kutusu (Daktilo Efekti) -->
    <g class="slide-1">
      <rect x="-350" y="-30" width="750" height="60" fill="#03060c" />
      <rect x="-350" y="-20" width="15" height="40" fill="#00e5ff" class="blink" />
    </g>
  </g>

  <g class="seq-2" transform="translate(640, 360)">
    <text x="0" y="15" font-size="45" font-weight="bold" fill="#00ff66" text-anchor="middle" letter-spacing="8">PYTHON_CORE // INITED</text>
    <g class="slide-2">
      <rect x="-400" y="-30" width="800" height="60" fill="#03060c" />
      <rect x="-400" y="-20" width="15" height="40" fill="#00ff66" class="blink" />
    </g>
  </g>

  <!-- =====================================================================
       AŞAMA 2: ANA ARAYÜZ (5.6 SANİYEDEN SONRA BELİRİR)
       ===================================================================== -->
  
  <g class="main-system">

    <!-- 1. MERKEZİ ÇEKİRDEK (X: 640, Y: 360) -->
    <g class="core-pop">
      <!-- Arka Plan Parlaması -->
      <circle cx="640" cy="360" r="140" fill="#00e5ff" opacity="0.05" />
      
      <!-- Sabit Dış Çerçeve -->
      <circle cx="640" cy="360" r="120" fill="none" stroke="#0044aa" stroke-width="2" />
      <path d="M 640,230 L 640,240 M 640,480 L 640,490 M 510,360 L 520,360 M 760,360 L 770,360" stroke="#00e5ff" stroke-width="2" />

      <!-- Dönen Halkalar -->
      <circle cx="640" cy="360" r="105" fill="none" stroke="#00e5ff" stroke-width="2" stroke-dasharray="60 20 10 20" class="spin-cw" />
      <circle cx="640" cy="360" r="90" fill="none" stroke="#00ff66" stroke-width="1" stroke-dasharray="10 40" class="spin-ccw" />
      
      <!-- Titreşen Merkez (Kalp) -->
      <polygon points="640,310 683,335 683,385 640,410 597,385 597,335" fill="none" stroke="#00e5ff" stroke-width="4" opacity="0.2" class="pulse" />
      <polygon points="640,320 674,340 674,380 640,400 606,380 606,340" fill="#00e5ff" opacity="0.1" />
      <polygon points="640,335 661,347 661,373 640,385 619,373 619,347" fill="none" stroke="#ffffff" stroke-width="1" />
      <circle cx="640" cy="360" r="4" fill="#ffffff" />
      
      <text x="640" y="440" font-size="10" fill="#00e5ff" text-anchor="middle" letter-spacing="2">SYS_ONLINE</text>
    </g>

    <!-- 2. BAĞLANTI YOLLARI (Çekirdekten panellere giden köprüler) -->
    <g fill="none" stroke="#0055ff" stroke-width="2">
      <path d="M 520,360 L 350,360" class="draw-line" />
      <path d="M 760,360 L 930,360" class="draw-line" />
    </g>

    <!-- 3. SOL PANEL: DONANIM (X: 50 - 350) -->
    <g class="panel" transform="translate(50, 150)">
      <!-- Panel Çerçevesi -->
      <path d="M 0,0 L 20,-20 L 300,-20 L 300,400 L 0,400 Z" fill="#0033aa" opacity="0.05" stroke="#00e5ff" stroke-width="1" />
      <text x="20" y="15" font-size="14" font-weight="bold" fill="#00e5ff" letter-spacing="1">DONANIM_MİMARİSİ</text>
      <line x1="20" y1="25" x2="280" y2="25" stroke="#0055ff" stroke-width="1" />

      <!-- İşlemci (CPU) -->
      <g transform="translate(20, 50)">
        <rect x="0" y="0" width="3" height="35" fill="#00e5ff" />
        <text x="12" y="12" font-size="10" fill="#a0b4d6">İŞLEMCİ (CPU)</text>
        <text x="12" y="30" font-size="16" font-weight="bold" fill="#ffffff">AMD Athlon 3000G</text>
        
        <rect x="12" y="45" width="240" height="4" fill="#001133" />
        <rect x="12" y="45" width="100" height="4" fill="#00e5ff" class="bar-move" />
      </g>

      <!-- Bellek (RAM) -->
      <g transform="translate(20, 140)">
        <rect x="0" y="0" width="3" height="35" fill="#00ff66" />
        <text x="12" y="12" font-size="10" fill="#a0b4d6">SİSTEM BELLEĞİ (RAM)</text>
        <text x="12" y="30" font-size="16" font-weight="bold" fill="#ffffff">16.00 GB</text>
        <text x="210" y="30" font-size="14" font-weight="bold" fill="#00ff66">53%</text>
        
        <rect x="12" y="45" width="240" height="8" fill="none" stroke="#0055ff" stroke-width="1" />
        <rect x="15" y="48" width="125" height="2" fill="#00ff66" />
      </g>

      <!-- İşletim Sistemi -->
      <g transform="translate(20, 240)">
        <rect x="0" y="0" width="260" height="45" fill="#0055ff" opacity="0.1" />
        <text x="12" y="18" font-size="10" fill="#a0b4d6">ÇEKİRDEK İŞLETİM SİSTEMİ</text>
        <text x="12" y="36" font-size="16" font-weight="bold" fill="#ffffff">WINDOWS 10 PRO</text>
        <circle cx="240" cy="22" r="4" fill="#00ff66" class="blink" />
      </g>
    </g>

    <!-- 4. SAĞ PANEL: YAZILIM VE AĞ (X: 930 - 1230) -->
    <g class="panel" transform="translate(930, 150)">
      <!-- Panel Çerçevesi -->
      <path d="M 0,-20 L 280,-20 L 300,0 L 300,400 L 0,400 Z" fill="#0033aa" opacity="0.05" stroke="#00e5ff" stroke-width="1" />
      <text x="20" y="15" font-size="14" font-weight="bold" fill="#00e5ff" letter-spacing="1">AKTİF_DÜĞÜMLER</text>
      <line x1="20" y1="25" x2="280" y2="25" stroke="#0055ff" stroke-width="1" />

      <!-- Modüller -->
      <g transform="translate(20, 50)">
        <!-- Modül 1 -->
        <g transform="translate(0, 0)">
          <rect x="0" y="0" width="260" height="35" fill="#001133" />
          <rect x="0" y="0" width="3" height="35" fill="#00ff66" />
          <text x="12" y="15" font-size="10" fill="#a0b4d6">M_01</text>
          <text x="12" y="28" font-size="14" font-weight="bold" fill="#ffffff">PYTHON ENGINE</text>
          <text x="210" y="22" font-size="12" fill="#00ff66">ONLINE</text>
        </g>

        <!-- Modül 2 -->
        <g transform="translate(0, 45)">
          <rect x="0" y="0" width="260" height="35" fill="#001133" />
          <rect x="0" y="0" width="3" height="35" fill="#00e5ff" />
          <text x="12" y="15" font-size="10" fill="#a0b4d6">M_02</text>
          <text x="12" y="28" font-size="14" font-weight="bold" fill="#ffffff">YZ YÖNETİM KURULU</text>
          <circle cx="230" cy="17" r="4" fill="#00e5ff" class="blink" />
        </g>

        <!-- Modül 3 (Error) -->
        <g transform="translate(0, 90)">
          <rect x="0" y="0" width="260" height="35" fill="#ff2a5f" opacity="0.1" />
          <rect x="0" y="0" width="3" height="35" fill="#ff2a5f" />
          <text x="12" y="15" font-size="10" fill="#ff2a5f">GIT: oguzhan-tpl</text>
          <text x="12" y="28" font-size="14" font-weight="bold" fill="#ffffff">PUSH FAILED</text>
          <text x="200" y="22" font-size="12" fill="#ff2a5f" font-weight="bold">ERR_403</text>
        </g>
      </g>

      <!-- Küresel İletişim (wp_oguz.46) - ZIPLAYAN EFEKT SİLİNDİ -->
      <g transform="translate(20, 260)">
        <text x="0" y="0" font-size="10" fill="#a0b4d6">KÜRESEL İLETİŞİM PROTOKOLÜ</text>
        <text x="0" y="25" font-size="24" font-weight="bold" fill="#ffffff" letter-spacing="2">wp_oguz.46</text>
        
        <!-- Statik Dijital Frekans / Barkod Tasarımı (Zıplamaz, şık durur) -->
        <g transform="translate(180, 10)" fill="#00e5ff" opacity="0.6">
          <rect x="0" y="0" width="2" height="15" />
          <rect x="4" y="5" width="2" height="10" />
          <rect x="8" y="2" width="2" height="13" />
          <rect x="12" y="8" width="2" height="7" />
          <rect x="16" y="0" width="2" height="15" />
          <rect x="20" y="4" width="2" height="11" />
          <rect x="24" y="1" width="2" height="14" />
          <rect x="28" y="9" width="2" height="6" />
        </g>

        <text x="0" y="45" font-size="10" fill="#00ff66" class="blink">&gt; BAĞLANTI AKTİF</text>
      </g>
    </g>

    <!-- 5. ÜST VE ALT BİLGİ ÇUBUKLARI -->
    <g transform="translate(50, 60)">
      <text x="0" y="0" font-size="20" font-weight="bold" fill="#ffffff" letter-spacing="2">OĞUZHAN_OS <tspan fill="#00e5ff">v5.0</tspan></text>
      <path d="M 0,10 L 200,10 L 220,20 L 1180,20" fill="none" stroke="#0055ff" stroke-width="1" />
    </g>

    <g transform="translate(50, 640)">
      <path d="M 0,0 L 20,20 L 1160,20 L 1180,0 Z" fill="#001133" stroke="#0044aa" stroke-width="1" />
      <text x="30" y="14" font-size="12" fill="#00e5ff">C:\Users\OGUZHAN&gt; status_check</text>
      <text x="250" y="14" font-size="12" fill="#a0b4d6">Sistem stabil. Biyometrik onaylandı. Bağlantı şifreli.</text>
      <rect x="230" y="4" width="8" height="12" fill="#00ff66" class="blink" />
    </g>

  </g>
</svg>
